<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Menu Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="test-container" class="p-4">
        <h1 class="text-xl font-bold mb-4">Mobile Menu Button Test</h1>
        <div id="button-container" class="border p-4 rounded-lg bg-white">
            <button 
                id="test-button"
                type="button"
                class="grid h-10 w-10 place-items-center rounded-lg text-brand-900 md:hidden hover:bg-cream-100 focus:outline-none focus:ring-2 focus:ring-brand-500 active:bg-cream-200 bg-gray-200"
                aria-label="Test button"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 5h16"></path>
                    <path d="M4 12h16"></path>
                    <path d="M4 19h16"></path>
                </svg>
            </button>
            <div id="status" class="mt-4 p-3 bg-gray-100 rounded">Status: Not clicked</div>
            <div id="info" class="mt-2 text-sm text-gray-600"></div>
        </div>
    </div>

    <script>
        const button = document.getElementById('test-button');
        const status = document.getElementById('status');
        const info = document.getElementById('info');
        let clickCount = 0;

        // Test various event types
        ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend'].forEach(eventType => {
            button.addEventListener(eventType, (e) => {
                e.preventDefault();
                e.stopPropagation();
                clickCount++;
                console.log(`${eventType} fired! Count: ${clickCount}`);
                status.textContent = `Status: ${eventType} fired! Click count: ${clickCount}`;
                status.className = 'mt-4 p-3 bg-green-100 text-green-800 rounded';
                
                // Show event details
                info.textContent = `Event: ${eventType}, Type: ${e.type}, Target: ${e.target.tagName}, Time: ${new Date().toLocaleTimeString()}`;
                
                // Visual feedback
                button.classList.add('bg-blue-200');
                setTimeout(() => button.classList.remove('bg-blue-200'), 200);
            }, { capture: true });
        });

        // Check button properties
        window.addEventListener('load', () => {
            const rect = button.getBoundingClientRect();
            const styles = window.getComputedStyle(button);
            
            const info = `
                Button Info:
                - Visible: ${button.offsetParent !== null}
                - Display: ${styles.display}
                - Z-Index: ${styles.zIndex}
                - Position: ${styles.position}
                - Rect: ${Math.round(rect.width)}x${Math.round(rect.height)} at (${Math.round(rect.left)},${Math.round(rect.top)})
                - Has pointer events: ${styles.pointerEvents !== 'none'}
                - Is in viewport: ${rect.top >= 0 && rect.left >= 0 && rect.bottom <= window.innerHeight && rect.right <= window.innerWidth}
            `;
            
            document.getElementById('info').textContent = info;
        });

        // Log page load
        console.log('Test page loaded');
        console.log('Viewport:', window.innerWidth, 'x', window.innerHeight);
        console.log('Button:', button);
    </script>
</body>
</html>
