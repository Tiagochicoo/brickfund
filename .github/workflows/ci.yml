name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Unit smoke (deal transitions)
        run: npx --yes tsx ../scripts/smoke-deal-transitions.ts
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_PB_URL: http://127.0.0.1:8090
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PB_URL: http://127.0.0.1:8090
          PB_ADMIN_EMAIL: ci@example.com
          PB_ADMIN_PASSWORD: ci-test-password
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
          PLATFORM_FEE_PERCENT: "3"
          SESSION_SECRET: ci-test-secret-key-32-chars-min