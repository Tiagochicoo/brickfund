services:
  # PocketBase already runs as a binary in backend/ (no container needed).
  # PocketBase binary: typically :8093 in prod systemd, :8090 in setup.sh default.

  # Documenso Community Edition — self-hosted, free, unlimited signatures,
  # no per-document API fees, AGPL-3.0. We share Postgres with PocketBase:
  # PocketBase uses embedded SQLite (file in backend/pb_data/), Documenso
  # uses Postgres. Keep them separate — different DBs, different purposes.
  postgres:
    image: postgres:16-alpine
    container_name: brickfund-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: documenso
    ports: ["5432:5432"]
    volumes:
      - documenso-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  documenso:
    image: documenso/documenso:latest
    container_name: brickfund-documenso
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NEXTAUTH_SECRET: ${DOCUMENSO_NEXTAUTH_SECRET:-dev-only-change-me-32-chars-min-aaaaa}
      NEXT_PRIVATE_ENCRYPTION_KEY: ${DOCUMENSO_ENC_KEY:-dev-only-encryption-key-32-chars-min}
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${DOCUMENSO_ENC_KEY2:-dev-only-encryption-key2-32-chars-mi}
      NEXT_PUBLIC_WEBAPP_URL: ${DOCUMENSO_PUBLIC_URL:-http://localhost:3100}
      NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://localhost:3000
      NEXT_PRIVATE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/documenso
      NEXT_PRIVATE_DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/documenso
      NEXT_PUBLIC_UPLOAD_TRANSPORT: database
      NEXT_PRIVATE_SMTP_TRANSPORT: smtp-auth
      NEXT_PRIVATE_SMTP_HOST: ${DOCUMENSO_SMTP_HOST:-smtp.resend.com}
      NEXT_PRIVATE_SMTP_PORT: ${DOCUMENSO_SMTP_PORT:-465}
      NEXT_PRIVATE_SMTP_USERNAME: ${DOCUMENSO_SMTP_USERNAME:-resend}
      NEXT_PRIVATE_SMTP_PASSWORD: ${DOCUMENSO_SMTP_PASSWORD}
      NEXT_PRIVATE_SMTP_FROM_NAME: ${DOCUMENSO_SMTP_FROM_NAME:-Brickfund}
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: ${DOCUMENSO_SMTP_FROM_ADDRESS:-noreply@brickfund.local}
      NEXT_PUBLIC_DISABLE_SIGNUP: "false"
    ports: ["3100:3000"]

volumes:
  documenso-pg:
